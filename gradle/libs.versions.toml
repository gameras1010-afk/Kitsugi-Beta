room = "2.7.1"
coil = "3.5.0"
markdownRenderer = "0.30.0"
youtubePlayer = "12.1.0"
media3 = "1.8.0"
gson = "2.10.1"

# TV, Supabase, Hilt & Serialization versions
hilt = "2.55"
kotlinxSerialization = "1.7.3"
tvMaterial = "1.0.0"
tvFoundation = "1.0.0-alpha11"
tvProvider = "1.1.0-beta01"
supabase = "3.0.3"
zxing = "3.5.3"
ktor = "2.3.12"
haze = "0.7.3"
nanohttpd = "2.3.1"
playServicesCast = "21.5.0"
work = "2.9.1"


junit = "4.13.2"
junitVersion = "1.2.1"
espressoCore = "3.6.1"

[libraries]
androidx-core-ktx = { group = "androidx.core", name = "core-ktx", version.ref = "coreKtx" }

androidx-lifecycle-runtime-ktx = { group = "androidx.lifecycle", name = "lifecycle-runtime-ktx", version.ref = "lifecycleRuntimeKtx" }
