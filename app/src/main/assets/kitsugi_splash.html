<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Kitsugi Splash</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: #050510;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }

  .scene {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* ── Arka plan kırmızı ışık halkası ── */
  .bg-glow {
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,10,10,0.12) 0%, transparent 70%);
    opacity: 0;
    animation: bgGlowIn 3s ease 0.3s forwards;
  }
  @keyframes bgGlowIn {
    0%   { opacity: 0; transform: scale(0.3); }
    60%  { opacity: 1; transform: scale(1.1); }
    100% { opacity: 0.7; transform: scale(1); }
  }

  /* ── Parçacık zerreler ── */
  .particles {
    position: absolute;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  .particle {
    position: absolute;
    border-radius: 50%;
    background: #FF2828;
    opacity: 0;
    animation: particleFly var(--dur) ease var(--delay) forwards;
  }
  @keyframes particleFly {
    0%   { opacity: 0; transform: translate(0,0) scale(0); }
    20%  { opacity: 0.8; }
    100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(var(--s)); }
  }

  /* ── SVG Torii konteyner ── */
  .torii-wrap {
    position: relative;
    z-index: 10;
    opacity: 0;
    transform: scale(0.6) translateY(40px);
    animation: toriiAppear 1.2s cubic-bezier(0.16,1,0.3,1) 0.8s forwards;
  }
  @keyframes toriiAppear {
    0%   { opacity: 0; transform: scale(0.6) translateY(40px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* Neon parıldama filtresi */
  .torii-svg {
    filter: drop-shadow(0 0 25px rgba(255,30,30,0.85))
            drop-shadow(0 0 50px rgba(255,0,0,0.4))
            drop-shadow(0 0 2px rgba(255,100,100,0.9));
  }

  /* ─────────────────────────────────────────────────────────
     Çizim animasyon ayarları (Stroke)
     ───────────────────────────────────────────────────────── */
  
  .gate-stroke {
    stroke-dasharray: 1200;
    stroke-dashoffset: 1200;
    animation: drawGate 1.4s ease 1.0s forwards;
  }
  
  /* Sıcak beyaz-pembe çekirdek çizgisi neonla beraber çizilir */
  .gate-core {
    stroke-dasharray: 1200;
    stroke-dashoffset: 1200;
    animation: drawGate 1.2s ease 1.1s forwards;
  }

  @keyframes drawGate {
    to { stroke-dashoffset: 0; }
  }

  /* Dolgu fade-in */
  .gate-fill {
    opacity: 0;
    animation: fillIn 0.8s ease 2.0s forwards;
  }
  @keyframes fillIn {
    to { opacity: 1; }
  }

  /* Glow pulse sonsuz */
  .gate-glow {
    opacity: 0;
    animation: glowPulse 2s ease 2.2s infinite;
  }
  @keyframes glowPulse {
    0%,100% { opacity: 0.15; }
    50%     { opacity: 0.45; }
  }

  /* ── Şok halkası dışa yayılım ── */
  .shockwave {
    position: absolute;
    width: 200px; height: 200px;
    border-radius: 50%;
    border: 2px solid rgba(255,40,40,0.8);
    opacity: 0;
    animation: shockwave1 0.8s ease 2.1s forwards,
               shockwave2 0.8s ease 2.6s forwards;
  }
  @keyframes shockwave1 {
    0%   { opacity: 0.9; transform: scale(0.5); }
    100% { opacity: 0;   transform: scale(2.5); }
  }
  @keyframes shockwave2 {
    0%   { opacity: 0.6; transform: scale(0.5); }
    100% { opacity: 0;   transform: scale(2.0); }
  }

  /* ── KITSUGI yazısı ── */
  .brand-text {
    position: relative;
    z-index: 10;
    margin-top: 32px;
    text-align: center;
    opacity: 0;
    transform: translateY(20px);
    animation: textAppear 1s cubic-bezier(0.16,1,0.3,1) 2.4s forwards;
  }
  @keyframes textAppear {
    to { opacity: 1; transform: translateY(0); }
  }

  .brand-name {
    font-size: 42px;
    font-weight: 700;
    letter-spacing: 12px;
    background: linear-gradient(135deg, #FF4444 0%, #FF8080 40%, #FFFFFF 60%, #FF6060 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 20px rgba(255,40,40,0.5));
  }

  .brand-sub {
    margin-top: 6px;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 7px;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    opacity: 0;
    animation: subAppear 0.8s ease 3.0s forwards;
  }
  @keyframes subAppear {
    to { opacity: 1; }
  }

  /* ── Altta loading çizgisi ── */
  .loader-line {
    position: relative;
    width: 120px;
    height: 2px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    overflow: hidden;
    opacity: 0;
    margin-top: 40px;
    animation: loaderShow 0.3s ease 2.8s forwards;
  }
  .loader-line::after {
    content: '';
    position: absolute;
    left: -100%;
    width: 60%;
    height: 100%;
    background: linear-gradient(90deg, transparent, #FF3333, transparent);
    animation: loaderSweep 1.2s ease-in-out 3.0s infinite;
  }
  @keyframes loaderShow { to { opacity: 1; } }
  @keyframes loaderSweep {
    0%   { left: -60%; }
    100% { left: 140%; }
  }

  /* ── Son fade-out ── */
  .scene.fade-out {
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  /* ── Yatay Mod Optimizasyonu ── */
  @media (orientation: landscape) and (max-height: 500px) {
    .torii-svg {
      width: 120px !important;
      height: 120px !important;
    }
    .brand-name {
      font-size: 28px !important;
      letter-spacing: 8px !important;
    }
    .brand-text {
      margin-top: 12px !important;
    }
    .loader-line {
      margin-top: 15px !important;
    }
  }

</style>
</head>
<body>
<div class="scene" id="scene">

  <!-- Arka plan ışık halkası -->
  <div class="bg-glow"></div>

  <!-- Parçacıklar -->
  <div class="particles" id="particles"></div>

  <!-- Şok dalgası halkaları -->
  <div class="shockwave"></div>

  <!-- Torii SVG -->
  <div class="torii-wrap">
    <svg class="torii-svg" width="200" height="200" viewBox="0 0 108 108" xmlns="http://www.w3.org/2000/svg">

      <!-- Glow katmanı (Geniş neon ışıması, sonradan belirir ve titrer) -->
      <g class="gate-glow" fill="none" stroke="#FF0000" stroke-width="7.0" stroke-opacity="0.25" stroke-linecap="round" stroke-linejoin="round">
        <path d="M16,22 Q54,14 92,22"/>
        <path d="M16,28 Q54,20 92,28"/>
        <line x1="30" y1="90" x2="30" y2="26"/>
        <line x1="78" y1="90" x2="78" y2="26"/>
        <line x1="30" y1="51" x2="78" y2="51"/>
      </g>

      <!-- Çizim neon stroke katmanı (Dış canlı kırmızı neon tüp) -->
      <g fill="none" stroke="#FF3333" stroke-width="3.0" stroke-linecap="round" stroke-linejoin="round">
        <!-- Sol sütun -->
        <line class="gate-stroke" x1="30" y1="90" x2="30" y2="26"/>
        <!-- Sağ sütun -->
        <line class="gate-stroke" x1="78" y1="90" x2="78" y2="26" style="animation-delay:1.05s"/>
        <!-- Alt kiriş -->
        <line class="gate-stroke" x1="30" y1="51" x2="78" y2="51" style="animation-delay:1.2s"/>
        <!-- Üst eğri 2 -->
        <path class="gate-stroke" d="M16,28 Q54,20 92,28" style="animation-delay:1.35s"/>
        <!-- Üst eğri 1 -->
        <path class="gate-stroke" d="M16,22 Q54,14 92,22" style="animation-delay:1.5s"/>
      </g>

      <!-- Çizim core katmanı (İç sıcak beyaz-pembe çekirdek hattı) -->
      <g fill="none" stroke="#FFD8D8" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round">
        <!-- Sol sütun core -->
        <line class="gate-core" x1="30" y1="89" x2="30" y2="27" style="animation-delay:1.1s"/>
        <!-- Sağ sütun core -->
        <line class="gate-core" x1="78" y1="89" x2="78" y2="27" style="animation-delay:1.15s"/>
        <!-- Alt kiriş core -->
        <line class="gate-core" x1="31" y1="51" x2="77" y2="51" style="animation-delay:1.3s"/>
        <!-- Üst eğri 2 core -->
        <path class="gate-core" d="M17,28 Q54,20.5 91,28" style="animation-delay:1.45s"/>
        <!-- Üst eğri 1 core -->
        <path class="gate-core" d="M17,22 Q54,14.5 91,22" style="animation-delay:1.6s"/>
      </g>

    </svg>
  </div>

  <!-- Marka yazısı -->
  <div class="brand-text">
    <div class="brand-name">KITSUGI</div>
    <div class="brand-sub">Anime List</div>
  </div>

  <!-- Loading çizgisi -->
  <div class="loader-line"></div>

</div>

<script>
// Parçacık sistemi
const container = document.getElementById('particles');
const count = 30;
for (let i = 0; i < count; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  const size = Math.random() * 4 + 1;
  const angle = Math.random() * Math.PI * 2;
  const dist = 80 + Math.random() * 180;
  p.style.cssText = `
    width:${size}px; height:${size}px;
    left: calc(50% + ${Math.cos(angle)*20}px);
    top:  calc(45% + ${Math.sin(angle)*20}px);
    --tx: ${Math.cos(angle)*dist}px;
    --ty: ${Math.sin(angle)*dist}px;
    --s:  ${Math.random()*1.5+0.3};
    --dur: ${(Math.random()*1.5+1.5).toFixed(2)}s;
    --delay: ${(Math.random()*1.5+1.8).toFixed(2)}s;
    opacity: 0;
  `;
  container.appendChild(p);
}

// Animasyon bitince Android'e sinyal gönder
setTimeout(function() {
  document.getElementById('scene').classList.add('fade-out');
  setTimeout(function() {
    try {
      if (window.KitsugiSplash) {
        window.KitsugiSplash.onAnimationComplete();
      }
    } catch(e) {}
  }, 500);
}, 5000);
</script>
</body>
</html>
